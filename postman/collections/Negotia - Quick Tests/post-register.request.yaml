$kind: http-request
name: POST Register
method: POST
url: 'http://localhost:5000/api/auth/register'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Tanmay",
      "email": "tanmay@test.com",
      "password": "123456",
      "role": "seller"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const status = pm.response.code;

      // Status checks
      pm.test("Status is 2xx or 4xx", function () {
        pm.expect(status).to.be.within(200, 499);
      });

      // Parse JSON safely
      let json;
      try {
        json = pm.response.json();
      } catch (e) {
        json = null;
      }

      if (status >= 200 && status < 300) {
        pm.test("Response is JSON", function () {
          pm.expect(json).to.be.an("object");
        });

        pm.test("Response includes token/user/id if present", function () {
          // allow APIs that return only a message on register
          if (!json) return;

          if (json.token !== undefined) {
            pm.expect(json.token).to.be.a("string");
          }

          if (json.user !== undefined) {
            pm.expect(json.user).to.be.an("object");
            if (json.user.id !== undefined) {
              pm.expect(json.user.id).to.exist;
            }
          }

          if (json.id !== undefined) {
            pm.expect(json.id).to.exist;
          }
        });
      } else if (status >= 400 && status < 500) {
        pm.test("Error response includes a message", function () {
          pm.expect(json).to.be.an("object");
          pm.expect(json).to.have.any.keys("message", "error");
        });
      }
